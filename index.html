<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sollentuna FK — Spelarstatistik</title>
  <link rel="icon" type="image/png" href="https://upload.wikimedia.org/wikipedia/commons/thumb/e/e3/Sollentuna_FK_logo_%282022%29.svg/960px-Sollentuna_FK_logo_%282022%29.svg.png">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0e1a;
      --surface: #111827;
      --surface2: #1a2235;
      --accent: #00d4ff;
      --green: #00e676;
      --yellow: #ffd600;
      --red: #ff1744;
      --orange: #ff6d00;
      --text: #e8eaf6;
      --muted: #6b7280;
      --border: #1e2d45;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'Barlow', sans-serif; min-height: 100vh; }

    /* LOGIN */
    .login-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(ellipse at center, #0d1b35 0%, #0a0e1a 70%);
    }
    .login-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2.5rem 2rem;
      width: 360px;
      text-align: center;
    }
    .login-box img { height: 64px; margin-bottom: 1rem; }
    .login-box h2 { font-family: 'Barlow Condensed', sans-serif; font-size: 1.6rem; color: var(--accent); margin-bottom: 0.25rem; }
    .login-box p { color: var(--muted); font-size: 0.85rem; margin-bottom: 1.5rem; }
    .login-box input {
      width: 100%; padding: 0.75rem 1rem;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text);
      font-family: 'Barlow', sans-serif; font-size: 0.95rem;
      margin-bottom: 0.75rem; outline: none;
    }
    .login-box input:focus { border-color: var(--accent); }
    .login-box .btn-login {
      width: 100%; padding: 0.75rem;
      background: var(--accent); color: #000;
      border: none; border-radius: 8px;
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700; font-size: 1.1rem;
      cursor: pointer; margin-top: 0.5rem;
    }
    .login-box .btn-login:hover { background: #00b8d9; }
    .login-error { color: var(--red); font-size: 0.85rem; margin-top: 0.5rem; }

    /* HEADER */
    header {
      background: linear-gradient(135deg, #0d1b35 0%, #0a0e1a 100%);
      border-bottom: 2px solid var(--accent);
      padding: 0 2rem;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky; top: 0; z-index: 100;
      box-shadow: 0 4px 30px rgba(0,212,255,0.15);
    }
    .header-left { display: flex; align-items: center; gap: 1rem; }
    .header-left img { height: 44px; }
    .header-title { font-family: 'Barlow Condensed', sans-serif; font-weight: 900; font-size: 1.4rem; color: var(--accent); letter-spacing: 1px; }
    .header-right { display: flex; align-items: center; gap: 1rem; }
    .user-badge { background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; padding: 0.3rem 0.9rem; font-size: 0.82rem; color: var(--muted); }
    .role-badge { border-radius: 4px; padding: 0.2rem 0.6rem; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; }
    .role-admin { background: rgba(255,215,0,0.15); color: var(--yellow); border: 1px solid var(--yellow); }
    .role-antrenor { background: rgba(0,230,118,0.15); color: var(--green); border: 1px solid var(--green); }
    .role-oyuncu { background: rgba(0,212,255,0.15); color: var(--accent); border: 1px solid var(--accent); }
    .btn-logout { background: transparent; border: 1px solid var(--border); color: var(--muted); padding: 0.3rem 0.8rem; border-radius: 6px; cursor: pointer; font-size: 0.82rem; }
    .btn-logout:hover { border-color: var(--red); color: var(--red); }

    /* MAIN */
    main { padding: 1.5rem 2rem; max-width: 1400px; margin: 0 auto; }

    /* TABS */
    .tabs { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; border-bottom: 2px solid var(--border); padding-bottom: 0; }
    .tab {
      padding: 0.6rem 1.4rem;
      background: transparent;
      border: none;
      border-bottom: 3px solid transparent;
      margin-bottom: -2px;
      color: var(--muted);
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700; font-size: 1rem;
      cursor: pointer; letter-spacing: 0.5px;
      transition: all 0.15s;
    }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
    .tab:hover:not(.active) { color: var(--text); }

    /* FILTER BAR */
    .filter-bar {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1rem 1.5rem;
      margin-bottom: 1.5rem;
      display: flex;
      gap: 1rem;
      align-items: flex-end;
      flex-wrap: wrap;
    }
    .filter-bar label { display: block; font-size: 0.75rem; color: var(--muted); margin-bottom: 0.3rem; text-transform: uppercase; letter-spacing: 0.5px; }
    .filter-bar input, .filter-bar select {
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--text); padding: 0.5rem 0.8rem;
      border-radius: 8px; font-family: 'Barlow', sans-serif;
      font-size: 0.9rem; outline: none;
    }
    .filter-bar input:focus, .filter-bar select:focus { border-color: var(--accent); }
    .btn { padding: 0.5rem 1.2rem; border-radius: 8px; font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 1rem; cursor: pointer; border: none; }
    .btn-primary { background: var(--accent); color: #000; }
    .btn-primary:hover { background: #00b8d9; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .btn-secondary:hover { border-color: var(--accent); }
    .btn-success { background: var(--green); color: #000; }
    .btn-danger { background: var(--red); color: #fff; }

    /* STATUS */
    .status-bar {
      background: rgba(0,212,255,0.08);
      border: 1px solid rgba(0,212,255,0.2);
      border-radius: 8px;
      padding: 0.6rem 1rem;
      margin-bottom: 1rem;
      display: none;
      align-items: center;
      gap: 0.75rem;
      font-size: 0.9rem;
    }
    .spinner { width: 18px; height: 18px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; flex-shrink: 0; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error-box { background: rgba(255,23,68,0.08); border: 1px solid rgba(255,23,68,0.3); border-radius: 8px; padding: 0.75rem 1rem; margin-bottom: 1rem; color: var(--red); font-size: 0.9rem; display: none; }

    /* TABLE */
    .table-wrap { overflow-x: auto; border-radius: 10px; border: 1px solid var(--border); }
    table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
    th { background: var(--surface2); color: var(--muted); font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 0.8rem; letter-spacing: 0.5px; text-transform: uppercase; padding: 0.75rem 0.6rem; text-align: left; cursor: pointer; white-space: nowrap; }
    th:hover { color: var(--text); }
    td { padding: 0.65rem 0.6rem; border-top: 1px solid var(--border); }
    tbody tr { background: var(--surface); transition: background 0.15s; }
    tbody tr:hover { background: var(--surface2); }
    tbody tr:nth-child(even) { background: rgba(26,34,52,0.5); }
    .badge { display: inline-block; background: rgba(0,212,255,0.15); color: var(--accent); border-radius: 4px; padding: 0.1rem 0.45rem; font-weight: 700; font-size: 0.82rem; min-width: 24px; text-align: center; }
    .badge-green { background: rgba(0,230,118,0.15); color: var(--green); }
    .badge-yellow { background: rgba(255,214,0,0.15); color: var(--yellow); }
    .badge-red { background: rgba(255,23,68,0.15); color: var(--red); }
    .badge-zero { background: transparent; color: var(--muted); }
    .player-name { font-weight: 600; }
    .shirt-no { color: var(--muted); font-size: 0.8rem; font-family: 'Barlow Condensed', sans-serif; }

    /* MATCH LIST */
    .match-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.85rem 1.2rem;
      margin-bottom: 0.6rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      cursor: pointer;
      transition: all 0.15s;
    }
    .match-card:hover { border-color: var(--accent); background: var(--surface2); }
    .match-card.selected { border-color: var(--accent); background: rgba(0,212,255,0.05); }
    .match-card.saved { border-color: var(--green); }
    .match-score { font-family: 'Barlow Condensed', sans-serif; font-size: 1.3rem; font-weight: 900; color: var(--accent); min-width: 60px; text-align: center; }
    .match-teams { flex: 1; }
    .match-teams .home { font-weight: 600; }
    .match-teams .away { color: var(--muted); font-size: 0.88rem; }
    .match-meta { font-size: 0.78rem; color: var(--muted); }
    .match-type-badge { font-size: 0.72rem; padding: 0.15rem 0.5rem; border-radius: 4px; font-weight: 700; }
    .type-lig { background: rgba(0,212,255,0.1); color: var(--accent); }
    .type-kupa { background: rgba(255,214,0,0.1); color: var(--yellow); }
    .type-hazirlik { background: rgba(107,114,128,0.1); color: var(--muted); }
    .match-saved-badge { font-size: 0.72rem; color: var(--green); font-weight: 700; }

    /* MATCH DETAIL */
    .detail-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      margin-top: 1rem;
    }
    .detail-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; flex-wrap: wrap; gap: 0.5rem; }
    .detail-score { font-family: 'Barlow Condensed', sans-serif; font-size: 2rem; font-weight: 900; color: var(--accent); }
    .detail-teams { font-size: 1.1rem; font-weight: 600; }
    .detail-meta { color: var(--muted); font-size: 0.85rem; }

    /* OYUNCU VIEW */
    .my-stats-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 2rem;
      max-width: 600px;
      margin: 0 auto;
    }
    .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin: 1.5rem 0; }
    .stat-item { text-align: center; background: var(--surface2); border-radius: 8px; padding: 1rem; }
    .stat-val { font-family: 'Barlow Condensed', sans-serif; font-size: 2.5rem; font-weight: 900; }
    .stat-lbl { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }

    /* ADMIN USERS */
    .user-form { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 1.2rem; margin-bottom: 1rem; display: grid; grid-template-columns: 1fr 1fr 1fr 1fr auto; gap: 0.75rem; align-items: end; }
    .user-form input, .user-form select { padding: 0.5rem; border-radius: 6px; background: var(--bg); border: 1px solid var(--border); color: var(--text); font-size: 0.9rem; outline: none; }

    .section-title { font-family: 'Barlow Condensed', sans-serif; font-size: 1.2rem; font-weight: 700; color: var(--text); margin-bottom: 1rem; letter-spacing: 0.5px; }
    .empty-state { text-align: center; padding: 3rem; color: var(--muted); }

    @media (max-width: 768px) {
      main { padding: 1rem; }
      .filter-bar { flex-direction: column; }
      .user-form { grid-template-columns: 1fr; }
      header { padding: 0 1rem; }
    }
  </style>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/sv.js"></script>
</head>
<body>

<!-- LOGIN -->
<div class="login-wrap" id="loginPage">
  <div class="login-box">
    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/e/e3/Sollentuna_FK_logo_%282022%29.svg/960px-Sollentuna_FK_logo_%282022%29.svg.png" alt="SFK">
    <h2>Sollentuna FK</h2>
    <p>Spelarstatistik — Logga in</p>
    <input type="text" id="loginUser" placeholder="Användarnamn" autocomplete="off">
    <input type="password" id="loginPass" placeholder="Lösenord">
    <button class="btn-login" onclick="doLogin()">Logga in</button>
    <div class="login-error" id="loginErr"></div>
  </div>
</div>

<!-- APP -->
<div id="appPage" style="display:none;">
  <header>
    <div class="header-left">
      <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/e/e3/Sollentuna_FK_logo_%282022%29.svg/960px-Sollentuna_FK_logo_%282022%29.svg.png" alt="SFK">
      <span class="header-title">SOLLENTUNA FK</span>
    </div>
    <div class="header-right">
      <span class="user-badge" id="userBadge"></span>
      <span class="role-badge" id="roleBadge"></span>
      <button class="btn-refresh" onclick="refreshToken()" title="Förnya MinFotboll token" style="background:transparent;border:1px solid var(--border);color:var(--muted);padding:0.3rem 0.8rem;border-radius:6px;cursor:pointer;font-size:0.82rem;" id="refreshBtn">🔄 Förnya token</button>
      <button class="btn-logout" onclick="doLogout()">Logga ut</button>
    </div>
  </header>

  <main>
    <div class="status-bar" id="statusBar">
      <div class="spinner"></div>
      <span id="statusText"></span>
    </div>
    <div class="error-box" id="errorBox"></div>

    <!-- ADMIN VIEW -->
    <div id="viewAdmin" style="display:none;">
      <div class="tabs">
        <button class="tab active" onclick="adminTab('matches')">Matcher</button>
        <button class="tab" onclick="adminTab('stats')">Statistik</button>
        <button class="tab" id="usersTab" onclick="adminTab('users')" style="display:none;">Användare</button>
      </div>

      <!-- MAÇLAR TAB -->
      <div id="adminMatches">
        <div class="filter-bar">
          <div><label>Från datum</label><input type="date" id="adminFrom" value="2025-11-08"></div>
          <div><label>Till datum</label><input type="date" id="adminTo" value=""></div>
          <div>
            <label>Matchtyp</label>
            <select id="adminType">
              <option value="hepsi">Alla matcher</option>
              <option value="lig">Seriematcher</option>
              <option value="kupa">Cupmatcher</option>
              <option value="hazirlik">Träningsmatcher</option>
            </select>
          </div>
          <div><button class="btn btn-primary" id="fetchMatchesBtn" onclick="fetchMatches()">⚡ Hämta matcher</button></div>
        </div>

        <div style="display:flex;gap:1rem;">
          <!-- Maç listesi -->
          <div style="flex:1;min-width:300px;">
            <div class="section-title">Matchlista <span id="matchCountBadge" style="color:var(--muted);font-size:0.85rem;"></span></div>
            <div id="matchList"><div class="empty-state">Hämta matcher för att börja</div></div>
          </div>
          <!-- Maç detay -->
          <div style="flex:2;" id="matchDetailWrap" style="display:none;">
            <div class="section-title">Matchdetaljer</div>
            <div id="matchDetail"><div class="empty-state">Välj en match</div></div>
          </div>
        </div>
      </div>

      <!-- İSTATİSTİKLER TAB -->
      <div id="adminStats" style="display:none;">
        <div class="filter-bar">
          <div><label>Från datum</label><input type="date" id="statsFrom" value="2025-01-01"></div>
          <div><label>Till datum</label><input type="date" id="statsTo"></div>
          <div><button class="btn btn-primary" onclick="loadStats()">📊 Visa statistik</button></div>
        </div>
        <div style="background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:0.75rem 1rem;margin-bottom:1rem;">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.5rem;">
            <span style="font-size:0.8rem;color:var(--muted);font-weight:600;">LIGA / MATCHTYP</span>
            <div style="display:flex;gap:0.5rem;">
              <button onclick="setAllLeagues(true)" style="font-size:0.75rem;background:none;border:1px solid var(--border);color:var(--muted);padding:2px 8px;border-radius:4px;cursor:pointer;">Alla</button>
              <button onclick="setAllLeagues(false)" style="font-size:0.75rem;background:none;border:1px solid var(--border);color:var(--muted);padding:2px 8px;border-radius:4px;cursor:pointer;">Ingen</button>
            </div>
          </div>
          <div style="display:flex;flex-wrap:wrap;gap:0.5rem 1.5rem;">
            <label style="display:flex;align-items:center;gap:0.4rem;cursor:pointer;white-space:nowrap;"><input type="checkbox" class="league-filter" value="P16 Div.1 2025" checked style="cursor:pointer;">P16 Div.1 2025</label>
<label style="display:flex;align-items:center;gap:0.4rem;cursor:pointer;white-space:nowrap;"><input type="checkbox" class="league-filter" value="P16 Div.1 2026" checked style="cursor:pointer;">P16 Div.1 2026</label>
<label style="display:flex;align-items:center;gap:0.4rem;cursor:pointer;white-space:nowrap;"><input type="checkbox" class="league-filter" value="P16 Ligacupen 2026" checked style="cursor:pointer;">P16 Ligacupen 2026</label>
<label style="display:flex;align-items:center;gap:0.4rem;cursor:pointer;white-space:nowrap;"><input type="checkbox" class="league-filter" value="P16 Ligacupen Grupp 3 2026" checked style="cursor:pointer;">P16 Ligacupen Grupp 3 2026</label>
<label style="display:flex;align-items:center;gap:0.4rem;cursor:pointer;white-space:nowrap;"><input type="checkbox" class="league-filter" value="P16 Träningsmatcher 2025" checked style="cursor:pointer;">P16 Träningsmatcher 2025</label>
<label style="display:flex;align-items:center;gap:0.4rem;cursor:pointer;white-space:nowrap;"><input type="checkbox" class="league-filter" value="P16 Träningsmatcher 2026" checked style="cursor:pointer;">P16 Träningsmatcher 2026</label>
<label style="display:flex;align-items:center;gap:0.4rem;cursor:pointer;white-space:nowrap;"><input type="checkbox" class="league-filter" value="P17 Allsvenskan 2026" checked style="cursor:pointer;">P17 Allsvenskan 2026</label>
<label style="display:flex;align-items:center;gap:0.4rem;cursor:pointer;white-space:nowrap;"><input type="checkbox" class="league-filter" value="P17 Ligacupen 2026" checked style="cursor:pointer;">P17 Ligacupen 2026</label>
<label style="display:flex;align-items:center;gap:0.4rem;cursor:pointer;white-space:nowrap;"><input type="checkbox" class="league-filter" value="P17 Träningsmatcher 2026" checked style="cursor:pointer;">P17 Träningsmatcher 2026</label>
          </div>
        </div>
        <div id="statsTable"><div class="empty-state">Ladda statistik</div></div>
      </div>

      <!-- KULLANICILAR TAB -->
      <div id="adminUsers" style="display:none;">
        <div class="section-title">Lägg till användare</div>
        <div class="user-form">
          <div><label style="font-size:0.75rem;color:var(--muted);">Användarnamn</label><input type="text" id="newUsername" placeholder="användarnamn"></div>
          <div><label style="font-size:0.75rem;color:var(--muted);">Lösenord</label><input type="password" id="newPassword" placeholder="lösenord"></div>
          <div><label style="font-size:0.75rem;color:var(--muted);">Namn</label><input type="text" id="newFullname" placeholder="Fullt namn"></div>
          <div>
            <label style="font-size:0.75rem;color:var(--muted);">Roll</label>
            <select id="newRole" onchange="togglePlayerSelect()">
              <option value="antrenor">Tränare</option>
              <option value="oyuncu">Spelare</option>
              <option value="admin">Admin</option>
            </select>
          </div>
          <div id="playerSelectWrap" style="display:none;">
            <label style="font-size:0.75rem;color:var(--muted);">Spelare</label>
            <select id="newPlayerId">
              <option value="">Välj spelare</option>
            </select>
          </div>
          <div><button class="btn btn-success" onclick="addUser()">+ Lägg till</button></div>
        </div>
        <div class="section-title">Användare</div>
        <div id="usersList"><div class="empty-state">Laddar...</div></div>
      </div>
    </div>

    <!-- ANTRENÖR VIEW -->
    <div id="viewAntrenor" style="display:none;">
      <div class="filter-bar">
        <div><label>Från datum</label><input type="date" id="trFrom" value="2025-01-01"></div>
        <div><label>Till datum</label><input type="date" id="trTo"></div>
        <div>
          <label>Matchtyp</label>
          <select id="trType">
            <option value="hepsi">Alla matcher</option>
            <option value="lig">Seriematcher</option>
            <option value="kupa">Cupmatcher</option>
            <option value="hazirlik">Träningsmatcher</option>
          </select>
        </div>
        <div><button class="btn btn-primary" onclick="loadTrStats()">📊 Visa statistik</button></div>
      </div>
      <div id="trStatsTable"><div class="empty-state">Ladda statistik</div></div>
    </div>

    <!-- OYUNCU VIEW -->
    <div id="viewOyuncu" style="display:none;">
      <!-- Statistik -->
      <div id="oyuncuViewStats">
        <div class="filter-bar">
          <div><label>Från datum</label><input type="date" id="oyuncuFrom" value="2025-01-01"></div>
          <div><label>Till datum</label><input type="date" id="oyuncuTo"></div>
          <div><button class="btn btn-primary" onclick="loadOyuncuStats()">📊 Visa statistik</button></div>
        </div>
        <div style="background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:0.75rem 1rem;margin-bottom:1rem;">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.5rem;">
            <span style="font-size:0.8rem;color:var(--muted);font-weight:600;">LIGA / MATCHTYP</span>
            <div style="display:flex;gap:0.5rem;">

<label style="display:flex;align-items:center;gap:0.4rem;cursor:pointer;white-space:nowrap;"><input type="checkbox" class="oyuncu-league-filter" value="P16 Ligacupen 2026" checked style="cursor:pointer;">P16 Ligacupen 2026</label>
<label style="display:flex;align-items:center;gap:0.4rem;cursor:pointer;white-space:nowrap;"><input type="checkbox" class="oyuncu-league-filter" value="P16 Ligacupen Grupp 3 2026" checked style="cursor:pointer;">P16 Ligacupen Grupp 3 2026</label>
<label style="display:flex;align-items:center;gap:0.4rem;cursor:pointer;white-space:nowrap;"><input type="checkbox" class="oyuncu-league-filter" value="P16 Träningsmatcher 2025" checked style="cursor:pointer;">P16 Träningsmatcher 2025</label>
<label style="display:flex;align-items:center;gap:0.4rem;cursor:pointer;white-space:nowrap;"><input type="checkbox" class="oyuncu-league-filter" value="P16 Träningsmatcher 2026" checked style="cursor:pointer;">P16 Träningsmatcher 2026</label>
<label style="display:flex;align-items:center;gap:0.4rem;cursor:pointer;white-space:nowrap;"><input type="checkbox" class="oyuncu-league-filter" value="P17 Allsvenskan 2026" checked style="cursor:pointer;">P17 Allsvenskan 2026</label>
<label style="display:flex;align-items:center;gap:0.4rem;cursor:pointer;white-space:nowrap;"><input type="checkbox" class="oyuncu-league-filter" value="P17 Ligacupen 2026" checked style="cursor:pointer;">P17 Ligacupen 2026</label>
<label style="display:flex;align-items:center;gap:0.4rem;cursor:pointer;white-space:nowrap;"><input type="checkbox" class="oyuncu-league-filter" value="P17 Träningsmatcher 2026" checked style="cursor:pointer;">P17 Träningsmatcher 2026</label>
          </div>
        </div>
        <div id="oyuncuStatsTable"><div class="empty-state">Ladda statistik</div></div>

</div>

<script>
// ===================== STATE =====================
const state = {
  token: localStorage.getItem('sfk_token') || null,
  user: JSON.parse(localStorage.getItem('sfk_user') || 'null'),
  sortCol: 'goals',
  sortDir: -1,
  selectedMatch: null,
  savedMatchIds: new Set(),
};

const SFK_PLAYERS = {
  583483:{name:'Gabriel Saadi',shirt:1},
  562656:{name:'Alexander Hansen',shirt:2},
  659792:{name:'Jeyson Sissah Nkanga Ngudi Jose',shirt:3},
  571649:{name:'Filip Kjellgren',shirt:4},
  572299:{name:'Alf Markusson',shirt:5},
  597435:{name:'Linus Olofsson',shirt:6},
  700142:{name:'Leo Olausson',shirt:7},
  595639:{name:'Hugo Meyer',shirt:8},
  571652:{name:'Gabriel Mocsary',shirt:9},
  558820:{name:'Frank Lundh',shirt:10},
  571659:{name:'Emil Wallberg',shirt:11},
  589844:{name:'Vincent Ekström Lundin',shirt:12},
  572290:{name:'Badou Badjan',shirt:14},
  572006:{name:'Gus Stefansson',shirt:16},
  595633:{name:'Cian Hogan',shirt:17},
  606521:{name:'Aksel Yesil',shirt:19},
  700147:{name:'Charlie Nordenson',shirt:20},
  576573:{name:'Albin Nordin',shirt:21},
  571068:{name:'Viggo Sejnäs',shirt:31},
  65947:{name:'Leonel Mikhail',shirt:35},
  595628:{name:'Valter Ekehov',shirt:66},
  573259:{name:'Love Nytén',shirt:77},
};

// ===================== AUTH =====================
async function doLogin() {
  const username = document.getElementById('loginUser').value.trim();
  const password = document.getElementById('loginPass').value;
  document.getElementById('loginErr').textContent = '';
  if (!username || !password) { document.getElementById('loginErr').textContent = 'Fyll i alla fält'; return; }
  try {
    const r = await fetch('/api/auth?action=login', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({username, password})
    });
    const d = await r.json();
    if (!r.ok) { document.getElementById('loginErr').textContent = d.error || 'Fel'; return; }
    state.token = d.token;
    state.user = d.user;
    localStorage.setItem('sfk_token', d.token);
    localStorage.setItem('sfk_user', JSON.stringify(d.user));
    showApp();
  } catch(e) {
    document.getElementById('loginErr').textContent = 'Anslutningsfel';
  }
}

function doLogout() {
  state.token = null; state.user = null;
  localStorage.removeItem('sfk_token');
  localStorage.removeItem('sfk_user');
  document.getElementById('appPage').style.display = 'none';
  document.getElementById('loginPage').style.display = 'flex';
}

function authHeaders() {
  return {'Content-Type':'application/json','Authorization':'Bearer ' + state.token};
}

// ===================== APP INIT =====================
function showApp() {
  document.getElementById('loginPage').style.display = 'none';
  document.getElementById('appPage').style.display = 'block';
  const u = state.user;
  document.getElementById('userBadge').textContent = u.full_name || u.username;
  const rb = document.getElementById('roleBadge');
  rb.textContent = u.role === 'admin' ? 'Admin' : u.role === 'antrenor' ? 'Tränare' : 'Spelare';
  rb.className = 'role-badge role-' + u.role;

  // Admin ve Tränare aynı admin panelini görür
  document.getElementById('viewAdmin').style.display = (u.role === 'admin' || u.role === 'antrenor') ? 'block' : 'none';
  document.getElementById('viewAntrenor').style.display = 'none';
  document.getElementById('viewOyuncu').style.display = u.role === 'oyuncu' ? 'block' : 'none';
  // Refresh token butonu sadece admin'e görünsün
  const refreshBtn = document.getElementById('refreshBtn');
  if (refreshBtn) refreshBtn.style.display = u.role === 'admin' ? 'inline-block' : 'none';

  document.getElementById('adminTo').value = new Date().toISOString().slice(0,10);
  document.getElementById('statsTo').value = new Date().toISOString().slice(0,10);
  document.getElementById('trTo').value = new Date().toISOString().slice(0,10);

  if (u.role === 'admin') { loadUsers(); populatePlayerSelect(); }
  // Users tabı: admin ve tränare görsün
  const usersTab = document.getElementById('usersTab');
  if (usersTab) usersTab.style.display = (u.role === 'admin' || u.role === 'antrenor') ? 'inline-block' : 'none';
  // Oyuncu için tarih alanlarını doldur
  if (u.role === 'oyuncu') {
    const today = new Date().toISOString().slice(0,10);
    document.getElementById('oyuncuTo').value = today;
    document.getElementById('oyuncuMatchTo').value = today;
  }
  if (u.role === 'oyuncu') loadMyStats();
}

function setStatus(msg, show=true) {
  document.getElementById('statusText').textContent = msg;
  document.getElementById('statusBar').style.display = show ? 'flex' : 'none';
}
function setError(msg) {
  const b = document.getElementById('errorBox');
  b.textContent = msg || '';
  b.style.display = msg ? 'block' : 'none';
}

// ===================== ADMIN TABS =====================
function adminTab(tab) {
  document.querySelectorAll('#viewAdmin .tab').forEach((t,i) => {
    t.classList.toggle('active', ['matches','stats','users'][i] === tab);
  });
  document.getElementById('adminMatches').style.display = tab === 'matches' ? 'block' : 'none';
  document.getElementById('adminStats').style.display = tab === 'stats' ? 'block' : 'none';
  document.getElementById('adminUsers').style.display = tab === 'users' ? 'block' : 'none';
}

// ===================== FETCH MATCHES =====================
async function fetchMatches() {
  const btn = document.getElementById('fetchMatchesBtn');
  btn.disabled = true;
  setError(null);
  setStatus('Hämtar matcher från MinFotboll...');
  try {
    const from = document.getElementById('adminFrom').value;
    const to = document.getElementById('adminTo').value;
    const type = document.getElementById('adminType').value;
    const params = new URLSearchParams({action:'fetchmatches', gameType:type});
    if (from) params.append('dateFrom', from);
    if (to) params.append('dateTo', to);

    const [matchesRes, savedRes] = await Promise.all([
      fetch('/api/admin?' + params, {headers: authHeaders()}),
      fetch('/api/admin?action=savedmatches', {headers: authHeaders()})
    ]);
    const matches = await matchesRes.json();
    const saved = await savedRes.json();

    state.savedMatchIds = new Set(Array.isArray(saved) ? saved.map(m => m.game_id) : []);

    setStatus('', false);
    renderMatchList(matches);
    document.getElementById('matchCountBadge').textContent = '(' + matches.length + ' matcher)';
  } catch(e) {
    setError('Fel: ' + e.message);
    setStatus('', false);
  }
  btn.disabled = false;
}

function renderMatchList(matches) {
  const el = document.getElementById('matchList');
  if (!matches.length) { el.innerHTML = '<div class="empty-state">Inga matcher hittades</div>'; return; }
  el.innerHTML = matches.map(m => {
    const isSaved = state.savedMatchIds.has(m.gameId);
    const d = new Date(m.gameDate);
    const dateStr = d.toLocaleDateString('sv-SE', {day:'2-digit',month:'short',year:'numeric'});
    const typeClass = 'type-' + m.gameType;
    const SFK_IDS = [398871, 74782];
    const isHome = SFK_IDS.includes(m.homeTeamId);
    const sfkLogo = 'https://upload.wikimedia.org/wikipedia/commons/thumb/e/e3/Sollentuna_FK_logo_%282022%29.svg/960px-Sollentuna_FK_logo_%282022%29.svg.png';
    const opponentLogo = isHome ? m.awayLogo : m.homeLogo;
    const opponentName = isHome ? m.awayTeam : m.homeTeam;
    const sfkScore = isHome ? m.homeScore : m.awayScore;
    const oppScore = isHome ? m.awayScore : m.homeScore;
    const logoStyle = 'width:36px;height:36px;object-fit:contain;border-radius:4px;';

    return `<div class="match-card ${isSaved ? 'saved' : ''}" onclick="loadMatchDetail(${JSON.stringify(m).replace(/"/g,'&quot;')})">
      <div style="display:flex;align-items:center;gap:0.5rem;min-width:120px;">
        ${isHome 
          ? `<img src="${sfkLogo}" style="${logoStyle}" onerror="this.style.display='none'">
             <div style="text-align:center;">
               <div class="match-score">${sfkScore} - ${oppScore}</div>
               <div class="match-meta">${dateStr}</div>
             </div>
             <img src="${opponentLogo}" style="${logoStyle}" onerror="this.style.display='none'">`
          : `<img src="${opponentLogo}" style="${logoStyle}" onerror="this.style.display='none'">
             <div style="text-align:center;">
               <div class="match-score">${oppScore} - ${sfkScore}</div>
               <div class="match-meta">${dateStr}</div>
             </div>
             <img src="${sfkLogo}" style="${logoStyle}" onerror="this.style.display='none'">`
        }
      </div>
      <div class="match-teams">
        <div class="home">${m.homeTeam}</div>
        <div class="away">${m.awayTeam}</div>
        <div style="margin-top:0.3rem;display:flex;gap:0.4rem;align-items:center;">
          <span class="match-type-badge ${typeClass}">${m.leagueName}</span>
          ${isSaved ? '<span class="match-saved-badge">✓ Sparad</span>' : ''}
        </div>
      </div>
    </div>`;
  }).join('');
}

async function loadMatchDetail(match, reporterId = null) {
  state.selectedMatch = match;
  document.querySelectorAll('.match-card').forEach(c => c.classList.remove('selected'));
  event.currentTarget.classList.add('selected');

  setStatus('Hämtar matchdetaljer...');
  document.getElementById('matchDetail').innerHTML = '<div class="empty-state">Laddar...</div>';

  try {
    const reporterParam = reporterId ? `&reporterId=${reporterId}` : '';
    const r = await fetch(`/api/admin?action=matchdetail&gameId=${match.gameId}&teamId=${match.teamId}${reporterParam}`, {headers: authHeaders()});
    const detail = await r.json();
    setStatus('', false);
    renderMatchDetail(detail);
  } catch(e) {
    setError('Fel: ' + e.message);
    setStatus('', false);
  }
}

function renderMatchDetail(detail) {
  const isSaved = state.savedMatchIds.has(detail.gameId);
  const d = new Date(detail.gameDate);
  const dateStr = d.toLocaleDateString('sv-SE', {weekday:'long', day:'numeric', month:'long', year:'numeric'});
  const playedCount = detail.players.length;

  const rows = detail.players.map((p,i) => `
    <tr id="prow_${i}" style="${p.selected ? '' : 'opacity:0.4;'}">
      <td style="text-align:center;">
        <input type="checkbox" ${p.selected ? 'checked' : ''} 
          onchange="togglePlayerRow(${i}, this.checked)" 
          style="cursor:pointer;width:16px;height:16px;">
      </td>
      <td><span class="shirt-no">#${p.shirt}</span></td>
      <td class="player-name">${p.name}</td>
      <td>
        ${p.isStarter ? '<span style="font-size:0.72rem;background:rgba(0,230,118,0.15);color:var(--green);border-radius:4px;padding:1px 5px;">11</span>' : 
          '<span style="font-size:0.72rem;background:rgba(107,114,128,0.1);color:var(--muted);border-radius:4px;padding:1px 5px;">Bänk</span>'}
      </td>
      <td>
        <input type="number" value="${p.minutesPlayed || 0}" min="0" max="120"
          style="width:50px;background:var(--surface2);border:1px solid var(--border);color:var(--accent);border-radius:4px;padding:2px 6px;text-align:center;"
          onchange="updatePlayerDetail(${i}, 'minutesPlayed', +this.value)"
          title="Minuter spelade">
      </td>
      <td><input type="number" value="${p.goals}" min="0" max="20" 
        style="width:50px;background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:4px;padding:2px 6px;text-align:center;" 
        onchange="updatePlayerDetail(${i}, 'goals', +this.value)"></td>
      <td><input type="number" value="${p.assists}" min="0" max="20" 
        style="width:50px;background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:4px;padding:2px 6px;text-align:center;" 
        onchange="updatePlayerDetail(${i}, 'assists', +this.value)"></td>
      <td><input type="number" value="${p.yellowCards}" min="0" max="3" 
        style="width:50px;background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:4px;padding:2px 6px;text-align:center;" 
        onchange="updatePlayerDetail(${i}, 'yellowCards', +this.value)"></td>
      <td><input type="number" value="${p.redCards}" min="0" max="2" 
        style="width:50px;background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:4px;padding:2px 6px;text-align:center;" 
        onchange="updatePlayerDetail(${i}, 'redCards', +this.value)"></td>
    </tr>
  `).join('');

  // Rapportör seçim paneli
  const reportersHtml = detail.reporters && detail.reporters.length > 1 ? `
    <div style="background:rgba(0,212,255,0.06);border:1px solid rgba(0,212,255,0.25);border-radius:10px;padding:1rem;margin-bottom:1rem;">
      <div style="color:var(--accent);font-weight:700;margin-bottom:0.75rem;">
        👥 ${detail.reporters.length} rapportör bulundu — Hangisinin verilerini kullanayım?
      </div>
      <div style="display:flex;gap:0.5rem;flex-wrap:wrap;">
        <button onclick="loadMatchDetail(state.selectedMatch, null)"
          style="padding:0.4rem 0.9rem;border-radius:6px;cursor:pointer;font-size:0.85rem;
          border:1px solid ${!detail.selectedReporterId ? 'var(--accent)' : 'var(--border)'};
          background:${!detail.selectedReporterId ? 'rgba(0,212,255,0.15)' : 'var(--surface2)'};
          color:${!detail.selectedReporterId ? 'var(--accent)' : 'var(--text)'};">
          Alla (duplicat-risk)
        </button>
        ${detail.reporters.map(rep => `
          <button onclick="loadMatchDetail(state.selectedMatch, ${rep.memberId})"
            style="padding:0.4rem 0.9rem;border-radius:6px;cursor:pointer;font-size:0.85rem;
            border:1px solid ${detail.selectedReporterId === rep.memberId ? 'var(--green)' : 'var(--border)'};
            background:${detail.selectedReporterId === rep.memberId ? 'rgba(0,230,118,0.15)' : 'var(--surface2)'};
            color:${detail.selectedReporterId === rep.memberId ? 'var(--green)' : 'var(--text)'};">
            ✓ ${rep.name} (${rep.eventCount} händelser)
          </button>
        `).join('')}
      </div>
    </div>
  ` : '';

  // Belirsiz olaylar paneli
  const ambiguousHtml = detail.ambiguous && detail.ambiguous.length > 0 ? `
    <div style="background:rgba(255,214,0,0.08);border:1px solid rgba(255,214,0,0.3);border-radius:10px;padding:1rem;margin-bottom:1rem;">
      <div style="color:var(--yellow);font-weight:700;margin-bottom:0.75rem;">
        ⚠️ ${detail.ambiguous.length} oklara händelser — Välj rätt spelare
      </div>
      ${detail.ambiguous.map((a,i) => `
        <div style="display:flex;align-items:center;gap:0.75rem;margin-bottom:0.5rem;flex-wrap:wrap;">
          <span style="background:var(--surface2);border-radius:4px;padding:0.2rem 0.5rem;font-size:0.8rem;">
            ${a.type === 'unknownPlayer' ? '👤 Okänd spelare i trupp' : a.minute + ' ' + (a.type === 'goal' ? '⚽ Mål' : a.type === 'assist' ? '🎯 Assist' : a.type === 'yellowCard' ? '🟨 Gult kort' : '🟥 Rött kort')}
          </span>
          <span style="color:var(--muted);font-size:0.85rem;">"${a.rawName}"</span>
          <select onchange="resolveAmbiguous(${i}, +this.value)" 
            style="background:var(--surface2);border:1px solid var(--yellow);color:var(--text);padding:0.3rem 0.6rem;border-radius:6px;font-size:0.85rem;flex:1;min-width:180px;">
            <option value="-1" selected>Inte vår spelare — ignorera</option>
            <option value="">— Välj spelare —</option>
            ${Object.keys(SFK_PLAYERS).map(pid => 
              `<option value="${pid}">#${SFK_PLAYERS[pid].shirt} ${SFK_PLAYERS[pid].name}</option>`
            ).join('')}
          </select>
        </div>
      `).join('')}
    </div>
  ` : '';

  document.getElementById('matchDetail').innerHTML = `
    <div class="detail-panel">
      ${reportersHtml}
      ${ambiguousHtml}
      <div class="detail-header">
        <div>
          <div class="detail-teams">${detail.homeTeam} vs ${detail.awayTeam}</div>
          <div class="detail-score">${detail.homeScore} - ${detail.awayScore}</div>
          <div class="detail-meta">${dateStr} · ${detail.leagueName}</div>
          <div style="margin-top:0.4rem;color:var(--green);font-size:0.85rem;">
            ✓ ${playedCount} SFK-spelare spelade i denna match
          </div>
        </div>
        <div style="display:flex;flex-direction:column;gap:0.5rem;align-items:flex-end;">
          <div style="display:flex;align-items:center;gap:0.5rem;">
            <label style="font-size:0.82rem;color:var(--muted);">Matchtid (min):</label>
            <input type="number" id="gameDuration" value="90" min="10" max="120" 
              style="width:60px;background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:0.3rem 0.5rem;text-align:center;">
          </div>
          <button class="btn btn-success" onclick="saveMatch()">
            ${isSaved ? '✓ Uppdatera' : '💾 Spara match'}
          </button>
          <div style="font-size:0.75rem;color:var(--muted);">
            Ospärade spelare sparas inte
          </div>
        </div>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr>
            <th title="Inkludera">✓</th>
            <th>#</th><th>Spelare</th>
            <th title="Roll">Roll</th>
            <th title="Minuter spelade">⏱ Min</th>
            <th style="color:var(--green)">⚽ Mål</th>
            <th style="color:var(--accent)">🎯 Ast</th>
            <th style="color:var(--yellow)">🟨 Gult</th>
            <th style="color:var(--red)">🟥 Rött</th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>
  `;

  state.currentDetail = detail;
}

function resolveAmbiguous(ambigIdx, playerId) {
  if (!state.currentDetail || !state.currentDetail.ambiguous) return;
  const a = state.currentDetail.ambiguous[ambigIdx];
  if (!playerId || playerId === -1) return; // ignorera
  
  const pid = parseInt(playerId);
  let playerIdx = state.currentDetail.players.findIndex(p => p.playerId === pid);
  
  // Oyuncu listede yoksa ekle (unknownPlayer durumu)
  if (playerIdx === -1) {
    const playerInfo = SFK_PLAYERS[pid];
    if (!playerInfo) return;
    const newPlayer = {
      playerId: pid,
      name: playerInfo.name,
      shirt: playerInfo.shirt,
      thumbnail: null,
      isStarter: false,
      isInSquad: true,
      playedInMatch: true,
      played: true,
      selected: true,
      minutesPlayed: a.type === 'unknownPlayer' ? 0 : 0,
      goals: 0, assists: 0, yellowCards: 0, redCards: 0,
    };
    state.currentDetail.players.push(newPlayer);
    playerIdx = state.currentDetail.players.length - 1;
  }
  
  if (a.type === 'goal') {
    state.currentDetail.players[playerIdx].goals++;
    // Input'u güncelle
    const inputs = document.querySelectorAll(`#prow_${playerIdx} input[type=number]`);
    if (inputs[0]) inputs[0].value = state.currentDetail.players[playerIdx].goals;
  } else if (a.type === 'assist') {
    state.currentDetail.players[playerIdx].assists++;
    const inputs = document.querySelectorAll(`#prow_${playerIdx} input[type=number]`);
    if (inputs[1]) inputs[1].value = state.currentDetail.players[playerIdx].assists;
  } else if (a.type === 'yellowCard') {
    state.currentDetail.players[playerIdx].yellowCards++;
    const inputs = document.querySelectorAll(`#prow_${playerIdx} input[type=number]`);
    if (inputs[2]) inputs[2].value = state.currentDetail.players[playerIdx].yellowCards;
  } else if (a.type === 'redCard') {
    state.currentDetail.players[playerIdx].redCards++;
    const inputs = document.querySelectorAll(`#prow_${playerIdx} input[type=number]`);
    if (inputs[3]) inputs[3].value = state.currentDetail.players[playerIdx].redCards;
  }
  
  // Çözülen olayı işaretle
  const select = document.querySelectorAll('[onchange*="resolveAmbiguous"]')[ambigIdx];
  if (select) {
    select.style.borderColor = 'var(--green)';
    select.disabled = true;
    const label = select.parentElement.querySelector('span:first-child');
    if (label) label.style.textDecoration = 'line-through';
  }
}

function togglePlayerRow(idx, selected) {
  if (state.currentDetail && state.currentDetail.players[idx]) {

function updatePlayerDetail(idx, field, value) {

  }
}

async function saveMatch() {
  if (!state.currentDetail) return;

  // Çözülmemiş oklara händelser var mı kontrol et (boş seçim kaldı mı)
  const selects = document.querySelectorAll('[onchange*="resolveAmbiguous"]');
  let unresolved = 0;
  selects.forEach(s => {
    if (!s.disabled && s.value === '') unresolved++;
  });
  if (unresolved > 0) {
    alert(`${unresolved} oklara händelse(r) har inte lösts. Välj spelare eller ignorera för alla händelser innan du sparar.`);
    return;
  }
  setStatus('Sparar match...');
  try {
    // Sadece seçili oyuncuları gönder
    const gameDuration = parseInt(document.getElementById('gameDuration')?.value) || 90;
    const payload = {
      ...state.currentDetail,
      gameDuration,
      players: state.currentDetail.players.filter(p => p.selected).map(p => ({
        ...p,
        minutesPlayed: p.minutesPlayed || 0
      }))
    };
    if (payload.players.length === 0) {
      setError('Ingen spelare vald!');
      setStatus('', false);
      return;
    }
    const r = await fetch('/api/admin?action=savematch', {
      method: 'POST',
      headers: authHeaders(),
      body: JSON.stringify(payload)
    });
    const d = await r.json();
    if (!r.ok) { setError(d.error); setStatus('',false); return; }
    state.savedMatchIds.add(state.currentDetail.gameId);
    setStatus('', false);
    setError(null);
    // Yeşil bildirim
    const btn = document.querySelector('#matchDetail .btn-success');
    if (btn) { btn.textContent = '✓ Sparad!'; setTimeout(() => btn.textContent = '✓ Uppdatera', 2000); }
    // Match listesini güncelle
    fetchMatches();
  } catch(e) {
    setError('Fel: ' + e.message);
    setStatus('', false);
  }
}

// Stats tablosu sıralama state'i
const statsSort = { col: 'minutesPlayed', dir: -1 };

function sortStatsTable(col) {
  if (statsSort.col === col) {
    statsSort.dir *= -1;
  } else {
    statsSort.col = col;
    statsSort.dir = -1;
  }
  // Aktif sıralama göstergesi
  document.querySelectorAll('.stats-th').forEach(th => {
    th.classList.remove('sort-asc', 'sort-desc');
    if (th.dataset.col === col) th.classList.add(statsSort.dir === -1 ? 'sort-desc' : 'sort-asc');
  });
  // Tabloyu yeniden render et
  if (window._lastStatsData) {
    const el = window._lastStatsEl;
    if (el) el.innerHTML = renderStatsTable(window._lastStatsData, '');
  }
}

function setAllLeagues(checked) {
  document.querySelectorAll('.league-filter').forEach(cb => cb.checked = checked);
}

function getSelectedLeagues() {
  return [...document.querySelectorAll('.league-filter:checked')].map(cb => cb.value);
}

function renderStatsTable(d, prefix) {
  window._lastStatsData = d;
  const players = [...(d.players || [])];
  if (!players.length) return '<div class="empty-state">Ingen statistik hittades</div>';

  // Sırala
  players.sort((a,b) => {
    const av = a[statsSort.col] ?? 0;
    const bv = b[statsSort.col] ?? 0;
    // null/0 değerler her zaman en alta (sıralama yönünden bağımsız)
    const aEmpty = av === 0 || av === null;
    const bEmpty = bv === 0 || bv === null;
    if (aEmpty && bEmpty) return a.name.localeCompare(b.name, 'sv');
    if (aEmpty) return 1;
    if (bEmpty) return -1;
    // Değerler farklıysa: dir=-1 demek büyük üste (azalan)
    if (bv !== av) return (bv - av) * statsSort.dir * -1;
    return a.name.localeCompare(b.name, 'sv');
  });

  const g = (n, cls='') => n > 0 ? `<span class="badge ${cls}">${n}</span>` : `<span class="badge badge-zero">—</span>`;
  const m = (n) => n > 0 ? `<span class="badge">${n}</span>` : `<span class="badge badge-zero">—</span>`;

  const rows = players.map(p => `<tr>
      <td><span class="shirt-no">#${p.shirt}</span></td>
      <td class="player-name">${p.name}</td>
      <td>${m(p.minutesPlayed || 0)}</td>
      <td>${g(p.games)}</td>
      <td>${g(p.starterGames || 0)}</td>
      <td>${g(p.goals,'badge-green')}</td>
      <td>${g(p.assists)}</td>
      <td>${g(p.yellowCards,'badge-yellow')}</td>
      <td>${g(p.redCards,'badge-red')}</td>
      <td>${g(p.goalsPerGame || 0)}</td>
      <td>${p.minutesPerGoal ? `<span class="badge">${p.minutesPerGoal}'</span>` : '<span class="badge badge-zero">—</span>'}</td>
      <td>${p.minutesPerGame > 0 ? `<span class="badge" style="background:rgba(0,212,255,0.1);color:var(--accent)">${p.minutesPerGame}'</span>` : '<span class="badge badge-zero">—</span>'}</td>
    </tr>`).join('');

  const thStyle = `cursor:pointer;user-select:none;`;
  const th = (col, label, style='') => `<th class="stats-th" data-col="${col}" onclick="sortStatsTable('${col}')" style="${thStyle}${style}" title="Sortera efter ${label}">${label} ${statsSort.col===col ? (statsSort.dir===-1?'↓':'↑') : '↕'}</th>`;

  return `<div style="margin-bottom:0.75rem;color:var(--muted);font-size:0.85rem;">${d.totalGames || 0} matcher sparade</div>
  <div class="table-wrap" id="statsTableWrap"><table>
    <thead><tr>
      <th>#</th><th>Spelare</th>
      ${th('minutesPlayed','Tot Min')}
      ${th('games','Trupp')}
      ${th('starterGames','Start 11')}
      ${th('goals','Mål','color:var(--green)')}
      ${th('assists','Ast','color:var(--accent)')}
      ${th('yellowCards','Gult','color:var(--yellow)')}
      ${th('redCards','Rött','color:var(--red)')}
      ${th('goalsPerGame','Mål/Match')}
      ${th('minutesPerGoal','Min/Mål')}
      ${th('minutesPerGame','Min/Match')}
    </tr></thead>
    <tbody>${rows}</tbody>
  </table></div>`;
}

function toggleEditPlayerSelect() {
  const role = document.getElementById('editRole').value;
  document.getElementById('editPlayerWrap').style.display = role === 'oyuncu' ? 'block' : 'none';
}

async function saveEditUser() {
  if (!_editUserId) return;
  const username = document.getElementById('editUsername').value.trim();
  const full_name = document.getElementById('editFullname').value.trim();
  const role = document.getElementById('editRole').value;
  const player_id = role === 'oyuncu' ? parseInt(document.getElementById('editPlayerId').value) || null : null;
  if (!username) { alert('Användarnamn krävs'); return; }

      method: 'POST', headers: authHeaders(),

  document.getElementById('changePassName').textContent = username;
  document.getElementById('newPassInput').value = '';
  document.getElementById('changePassPanel').style.display = 'block';
  document.getElementById('editUserPanel').style.display = 'none';
  document.getElementById('changePassPanel').scrollIntoView({behavior:'smooth'});
}

async function saveNewPassword() {
  if (!_changePassUserId) return;
  const password = document.getElementById('newPassInput').value;
  if (!password) { alert('Ange nytt lösenord'); return; }
  try {
    const r = await fetch('/api/auth?action=changepassword', {
      method: 'POST', headers: authHeaders(),
      body: JSON.stringify({id: _changePassUserId, password})
    });
    const d = await r.json();
    if (!r.ok) { alert(d.error); return; }
    document.getElementById('changePassPanel').style.display = 'none';
    _changePassUserId = null;
    alert('Lösenordet har ändrats!');
  } catch(e) { alert('Fel: ' + e.message); }
}

async function deleteUser(id, username) {
  if (!confirm(`Ta bort användaren "${username}"?`)) return;
  try {
    const r = await fetch('/api/auth?action=deleteuser', {
      method: 'POST', headers: authHeaders(),
      body: JSON.stringify({id})
    });
    const d = await r.json();
    if (!r.ok) { alert(d.error); return; }
    loadUsers();
  } catch(e) { alert('Fel: ' + e.message); }
}

          <td class="player-name" style="font-size:0.85rem;">${m.homeTeam} vs ${m.awayTeam}</td>
          <td style="font-weight:700;">${m.homeScore}-${m.awayScore}</td>
          <td>${m.minutesPlayed > 0 ? `<span class="badge">${m.minutesPlayed}'</span>` : '<span class="badge badge-zero">—</span>'}</td>
          <td>${m.goals > 0 ? `<span class="badge badge-green">${m.goals}</span>` : '—'}</td>
          <td>${m.assists > 0 ? `<span class="badge">${m.assists}</span>` : '—'}</td>
          <td>${m.yellowCards > 0 ? `<span class="badge badge-yellow">${m.yellowCards}</span>` : '—'}</td>
          <td>${m.redCards > 0 ? `<span class="badge badge-red">${m.redCards}</span>` : '—'}</td>
        </tr>`;
      }).join('')}</tbody>
    </table></div>` : '<div class="empty-state">Inga matcher hittades</div>'}
  `;
}


function oyuncuTab(tab) {
  document.getElementById('oyuncuTabStats').classList.toggle('active', tab === 'stats');
  document.getElementById('oyuncuTabMatches').classList.toggle('active', tab === 'matches');
  document.getElementById('oyuncuViewStats').style.display = tab === 'stats' ? 'block' : 'none';
  document.getElementById('oyuncuViewMatches').style.display = tab === 'matches' ? 'block' : 'none';
}

async function loadOyuncuStats() {
  setStatus('Laddar statistik...');
  try {
    const from = document.getElementById('oyuncuFrom').value;
    const to = document.getElementById('oyuncuTo').value;
    const type = document.getElementById('oyuncuType').value;
    const params = new URLSearchParams({action:'mystats'});
    if (from) params.append('dateFrom', from);
    if (to) params.append('dateTo', to);
    const selLeagues = [...document.querySelectorAll('.oyuncu-league-filter:checked')].map(c=>c.value);
    if (selLeagues.length > 0) params.append('leagueNames', selLeagues.join('|'));
    const r = await fetch('/api/stats?' + params, {headers: authHeaders()});
    const d = await r.json();
    setStatus('', false);
    document.getElementById('oyuncuStatsTable').innerHTML = renderMyStats(d);
  } catch(e) {
    setError('Fel: ' + e.message);
    setStatus('', false);
  }
}

async function loadOyuncuMatches() {
  setStatus('Hämtar matcher...');
  try {
    const from = document.getElementById('oyuncuMatchFrom').value;
    const to = document.getElementById('oyuncuMatchTo').value;
    const type = document.getElementById('oyuncuMatchType').value;
    const params = new URLSearchParams({action:'savedmatches'});
    if (type && type !== 'hepsi') params.append('gameType', type);
    if (from) params.append('dateFrom', from);
    if (to) params.append('dateTo', to);
    const r = await fetch('/api/admin?' + params, {headers: authHeaders()});
    const matches = await r.json();
    setStatus('', false);
    const el = document.getElementById('oyuncuMatchList');
    if (!Array.isArray(matches) || !matches.length) {
      el.innerHTML = '<div class="empty-state">Inga matcher hittades</div>';
      return;
    }
    el.innerHTML = matches
      .filter(m => {
        if (type && type !== 'hepsi' && m.game_type !== type) return false;
        if (from && new Date(m.game_date) < new Date(from)) return false;
        if (to && new Date(m.game_date) > new Date(to + 'T23:59:59')) return false;
        return true;
      })
      .map(m => {
        const d = new Date(m.game_date);
        const dateStr = d.toLocaleDateString('sv-SE', {day:'2-digit',month:'short',year:'numeric'});
        const typeClass = 'type-' + (m.game_type || 'lig');
        return `<div class="match-card">
          <div>
            <div class="match-score">${m.home_score} - ${m.away_score}</div>
            <div class="match-meta">${dateStr}</div>
          </div>
          <div class="match-teams">
            <div class="home">${m.home_team}</div>
            <div class="away">${m.away_team}</div>
            <div style="margin-top:0.3rem;">
              <span class="match-type-badge ${typeClass}">${m.league_name}</span>
            </div>
          </div>
        </div>`;
      }).join('');
  } catch(e) {
    setError('Fel: ' + e.message);
    setStatus('', false);
  }
}

async function refreshToken() {
  const btn = document.getElementById('refreshBtn');
  if (!btn) return;
  btn.textContent = '⏳ Förnyas...';
  btn.disabled = true;
  try {
    const r = await fetch('/api/refresh-token?secret=sfkRefresh2026!');
    const d = await r.json();
    if (d.success) {
      btn.textContent = '✓ Token förnyad!';
      btn.style.color = 'var(--green)';
      btn.style.borderColor = 'var(--green)';
      setTimeout(() => {
        btn.textContent = '🔄 Förnya token';
        btn.style.color = 'var(--muted)';
        btn.style.borderColor = 'var(--border)';
        btn.disabled = false;
      }, 3000);
    } else {
      btn.textContent = '❌ Misslyckades';
      btn.style.color = 'var(--red)';
      setTimeout(() => {
        btn.textContent = '🔄 Förnya token';
        btn.style.color = 'var(--muted)';
        btn.style.borderColor = 'var(--border)';
        btn.disabled = false;
      }, 3000);
    }
  } catch(e) {
    btn.textContent = '❌ Fel';
    btn.disabled = false;
  }
}
